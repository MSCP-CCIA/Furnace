project:
  name: default-study
  output_dir: outputs\test-pipeline-run
  seed: 42
model:
  source: toy
  name: toy_mlp
  task: classification
  input_dim: 8
  hidden_dim: 16
  num_classes: 2
data:
  dataset_name: synthetic_classification
  subset: null
  batch_size: 16
  num_samples: 256
  calibration_samples: 64
optimization:
  candidates:
    - name: baseline
      method: baseline
      backend: null
      enabled: true
      dtype: null
      mode: null
      amount: null
    - name: dynamic_int8
      method: dynamic_quantization
      backend: null
      enabled: true
      dtype: null
      mode: null
      amount: null
evaluation:
  metrics:
    - accuracy
    - f1
    - latency
    - memory
    - model_size
constraints:
  max_quality_loss: 0.05
  max_latency_ms: 1000.0
  max_memory_mb: 4096.0
  max_model_size_mb: 512.0
decision:
  weights:
    accuracy: 0.4
    f1: 0.2
    latency: 0.2
    memory: 0.1
    model_size: 0.1
reporting:
  formats:
    - markdown
tracking:
  backend: local
